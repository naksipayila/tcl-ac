<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/favicon.png">
<title>TCL AC Control</title>
<style>
  * { box-sizing: border-box; }

  :root {
    color-scheme: dark;
    --page-bg: #030405;
    --page-glow: rgba(50, 60, 72, 0.18);
    --panel-bg: rgba(7, 8, 10, 0.96);
    --panel-border: rgba(102, 118, 138, 0.34);
    --card-bg: rgba(18, 21, 26, 0.78);
    --card-bg-strong: rgba(24, 29, 36, 0.86);
    --card-border: rgba(103, 118, 137, 0.28);
    --text-main: #e9edf3;
    --text-soft: #b2bac6;
    --text-muted: #68717f;
    --accent-contrast: #eaf6fb;
    --cool: #3d9cc3;
    --cool-soft: rgba(41, 115, 151, 0.28);
    --rest: #b77933;
    --rest-soft: rgba(130, 82, 31, 0.28);
    --danger: #bf5454;
    --danger-soft: rgba(132, 45, 45, 0.28);
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  body[data-phase="cooling"] { --page-glow: rgba(39, 109, 146, 0.22); }
  body[data-phase="resting"] { --page-glow: rgba(133, 82, 28, 0.2); }
  body[data-phase="off"] { --page-glow: rgba(128, 42, 42, 0.18); }

  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    color: var(--text-main);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 50% -18%, var(--page-glow), transparent 34%),
      radial-gradient(circle at 92% 10%, rgba(63, 76, 91, 0.12), transparent 28%),
      radial-gradient(circle at 5% 90%, rgba(55, 63, 74, 0.1), transparent 30%),
      linear-gradient(180deg, #07080a 0%, var(--page-bg) 58%, #010101 100%);
  }

  button,
  input { font: inherit; }

  button {
    appearance: none;
    border: 0;
    cursor: pointer;
  }

  button:focus-visible,
  input:focus-visible,
  .power-slider:focus-visible {
    outline: 2px solid var(--phase, var(--cool));
    outline-offset: 3px;
  }

  .app-shell,
  .login-shell {
    width: min(100%, 760px);
    padding: 16px;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(65, 78, 94, 0.14), rgba(9, 11, 14, 0.18) 44%, rgba(29, 35, 43, 0.16)),
      var(--panel-bg);
    box-shadow:
      0 22px 70px rgba(0, 0, 0, 0.62),
      inset 0 1px 0 rgba(143, 163, 188, 0.08);
    backdrop-filter: blur(18px);
  }

  .app-shell {
    --phase: #788493;
    --phase-soft: rgba(86, 96, 109, 0.18);
    --phase-contrast: #ecf1f6;
    display: grid;
    grid-template-columns: minmax(0, 1.08fr) minmax(260px, 0.92fr);
    align-items: start;
    gap: 9px;
  }

  .app-shell[data-phase="cooling"] {
    --phase: var(--cool);
    --phase-soft: var(--cool-soft);
    --phase-contrast: #eef9ff;
  }

  .app-shell[data-phase="resting"] {
    --phase: var(--rest);
    --phase-soft: var(--rest-soft);
    --phase-contrast: #fff3e2;
  }

  .app-shell[data-phase="off"] {
    --phase: var(--danger);
    --phase-soft: var(--danger-soft);
    --phase-contrast: #ffecec;
  }

  .login-shell { max-width: 360px; }

  .card {
    width: 100%;
    margin: 0 auto;
    padding: 12px;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background:
      linear-gradient(180deg, rgba(60, 70, 84, 0.16), rgba(8, 10, 13, 0.08)),
      var(--card-bg);
    box-shadow:
      inset 0 1px 0 rgba(139, 158, 184, 0.07),
      0 14px 38px rgba(0, 0, 0, 0.22);
  }

  .panel-header,
  .status-topline,
  .section-heading,
  .control-row,
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header {
    grid-column: 1 / -1;
    gap: 10px;
    padding: 2px 2px 4px;
  }

  .panel-header h1 {
    margin: 3px 0 0;
    font-size: clamp(22px, 5vw, 32px);
    line-height: 0.94;
    letter-spacing: -0.05em;
  }

  .header-meta {
    display: grid;
    justify-items: end;
    gap: 5px;
    flex: 0 0 auto;
  }

  .environment-badge,
  .phase-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 26px;
    padding: 0 9px;
    border: 1px solid rgba(103, 118, 137, 0.28);
    border-radius: 5px;
    color: var(--text-soft);
    background: rgba(16, 19, 24, 0.82);
    font-size: 10px;
    font-weight: 760;
  }

  .environment-badge::before,
  .phase-dot {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: var(--phase, #aeb6c2);
    box-shadow: 0 0 12px var(--phase, rgba(120, 132, 147, 0.3));
  }

  .environment-badge.is-local::before { background: var(--rest); }

  .last-updated {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 650;
  }

  .status-card {
    position: relative;
    overflow: hidden;
    padding: 14px;
  }

  .status-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    background:
      radial-gradient(circle at 22% 0%, var(--phase-soft), transparent 34%),
      radial-gradient(circle at 96% 18%, rgba(82, 96, 116, 0.14), transparent 24%);
    pointer-events: none;
  }

  .status-card > * {
    position: relative;
    z-index: 1;
  }

  .status-topline { gap: 8px; }

  .phase-chip {
    color: var(--phase);
    background: linear-gradient(180deg, var(--phase-soft), rgba(10, 12, 15, 0.7));
  }

  .metric-label,
  .section-label,
  .login-label,
  .eyebrow {
    margin: 0;
    color: var(--text-muted);
    font-size: 8px;
    font-weight: 780;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .hero-status {
    margin: 14px 0 12px;
  }

  .status-title {
    margin: 4px 0 0;
    color: var(--text-main);
    font-size: clamp(30px, 7vw, 48px);
    font-weight: 820;
    line-height: 0.9;
    letter-spacing: -0.065em;
  }

  .status-subtitle {
    margin: 8px 0 0;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 620;
  }

  .readout-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
  }

  .readout {
    min-height: 50px;
    padding: 9px 10px;
    border: 1px solid rgba(103, 118, 137, 0.22);
    border-radius: 5px;
    background: rgba(3, 5, 7, 0.36);
  }

  .metric-value {
    display: block;
    margin-top: 4px;
    overflow: hidden;
    color: var(--text-main);
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: 800;
    letter-spacing: -0.04em;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .refresh-button,
  .logout-button {
    flex: 0 0 auto;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid var(--card-border);
    border-radius: 4px;
    background: rgba(18, 21, 26, 0.82);
    color: var(--text-soft);
    font-size: 10px;
    font-weight: 760;
    transition: transform 0.18s var(--ease), border-color 0.18s var(--ease), background 0.18s var(--ease);
  }

  .refresh-button:hover,
  .logout-button:hover {
    border-color: rgba(118, 136, 158, 0.42);
    background: rgba(26, 31, 38, 0.92);
  }

  .action-grid {
    display: grid;
    grid-template-columns: 1.18fr 0.82fr;
    gap: 7px;
    margin-top: 10px;
  }

  .action-button,
  .login-button {
    width: 100%;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 9px;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text-main);
    background: var(--card-bg);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: -0.01em;
    transition: transform 0.18s var(--ease), opacity 0.18s var(--ease), background 0.18s var(--ease), border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }

  .action-button:not(:disabled):hover,
  .login-button:not(:disabled):hover,
  .control-row:not(:disabled):hover,
  .power-slider:not(.is-busy):not(.is-dragging):hover {
    transform: translateY(-1px);
  }

  .action-primary,
  .login-button {
    color: var(--accent-contrast);
    border-color: rgba(61, 156, 195, 0.46);
    background: linear-gradient(135deg, rgba(61, 156, 195, 0.34), rgba(17, 28, 36, 0.96));
    box-shadow: 0 12px 30px rgba(24, 88, 119, 0.2);
  }

  .action-danger {
    border-color: rgba(191, 84, 84, 0.35);
    color: #f2c6c6;
    background: linear-gradient(135deg, rgba(128, 42, 42, 0.3), rgba(18, 21, 26, 0.86));
  }

  .action-danger:not(:disabled):hover {
    border-color: rgba(191, 84, 84, 0.6);
    background: linear-gradient(135deg, rgba(148, 49, 49, 0.36), rgba(22, 25, 31, 0.9));
  }

  .action-button:disabled,
  .control-row.is-disabled {
    opacity: 0.44;
    cursor: not-allowed;
  }

  .controls-card {
    padding: 11px;
    align-self: stretch;
    display: flex;
    flex-direction: column;
  }

  .section-heading {
    gap: 8px;
    margin: 0 2px 7px;
  }

  .section-note {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 680;
  }

  .control-list {
    display: grid;
    flex: 1;
    gap: 7px;
  }

  .control-row {
    width: 100%;
    min-height: 50px;
    gap: 9px;
    padding: 9px 11px;
    border: 1px solid var(--card-border);
    border-radius: 5px;
    background: rgba(15, 18, 23, 0.84);
    color: inherit;
    text-align: left;
    transition: transform 0.18s var(--ease), background 0.18s var(--ease), border-color 0.18s var(--ease), opacity 0.18s var(--ease);
  }

  .control-row.is-active {
    border-color: color-mix(in srgb, var(--phase) 46%, rgba(103, 118, 137, 0.24));
    background: linear-gradient(135deg, var(--phase-soft), rgba(15, 18, 23, 0.88));
  }

  .control-main {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .control-icon {
    position: relative;
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(103, 118, 137, 0.24);
    border-radius: 4px;
    background: rgba(3, 5, 7, 0.42);
  }

  .control-icon::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--text-muted);
    box-shadow: 0 0 0 rgba(255, 255, 255, 0);
  }

  .control-row.is-active .control-icon::before {
    background: var(--phase);
    box-shadow: 0 0 18px var(--phase);
  }

  .control-copy { min-width: 0; }

  .control-title {
    display: block;
    color: var(--text-main);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: -0.015em;
  }

  .control-meta {
    display: block;
    margin-top: 3px;
    overflow: hidden;
    color: var(--text-muted);
    font-size: 10px;
    line-height: 1.35;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .switch {
    position: relative;
    flex: 0 0 auto;
    width: 38px;
    height: 22px;
  }

  .switch input {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
  }

  .switch span {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(103, 118, 137, 0.28);
    border-radius: 5px;
    background: rgba(5, 7, 10, 0.72);
    transition: background 0.18s var(--ease), border-color 0.18s var(--ease);
  }

  .switch span::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    background: #aeb7c2;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.34);
    transition: transform 0.18s var(--ease);
  }

  .switch input:checked + span {
    border-color: color-mix(in srgb, var(--phase) 55%, rgba(255, 255, 255, 0.25));
    background: linear-gradient(135deg, color-mix(in srgb, var(--phase) 68%, #111820), rgba(12, 16, 21, 0.92));
  }

  .switch input:checked + span::after { transform: translateX(16px); }

  .power-slider {
    --power-knob-inset: 5px;
    --power-knob-size: 38px;
    --power-progress: 0;
    position: relative;
    width: 100%;
    min-height: 54px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    padding: 8px 12px 8px 52px;
    border: 1px solid var(--card-border);
    border-radius: 5px;
    background: rgba(15, 18, 23, 0.84);
    user-select: none;
    touch-action: pan-y;
    transition: transform 0.18s var(--ease), background 0.18s var(--ease), border-color 0.18s var(--ease);
  }

  .power-slider::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--phase-soft), rgba(53, 64, 78, 0.22));
    opacity: 0.9;
    transform: scaleX(var(--power-progress));
    transform-origin: left center;
    transition: transform 0.2s var(--ease);
  }

  .power-slider-knob {
    position: absolute;
    left: var(--power-knob-inset);
    top: 50%;
    z-index: 2;
    width: var(--power-knob-size);
    height: var(--power-knob-size);
    display: grid;
    place-items: center;
    border: 1px solid color-mix(in srgb, var(--phase) 36%, rgba(103, 118, 137, 0.28));
    border-radius: 4px;
    color: var(--phase-contrast);
    background: linear-gradient(135deg, color-mix(in srgb, var(--phase) 34%, #151d26), #0b0d10);
    box-shadow: 0 9px 22px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.5);
    cursor: grab;
    transform: translateY(-50%);
    transition: transform 0.2s var(--ease), background 0.18s var(--ease), color 0.18s var(--ease);
  }

  .power-slider:active .power-slider-knob { cursor: grabbing; }

  .power-slider-copy {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 2px;
    min-width: 0;
  }

  .power-slider-label {
    overflow: hidden;
    color: var(--text-main);
    font-size: 12px;
    font-weight: 820;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .power-slider-hint {
    overflow: hidden;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 650;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .power-slider.power-on {
    border-color: color-mix(in srgb, var(--phase) 42%, rgba(103, 118, 137, 0.24));
    background: linear-gradient(135deg, var(--phase-soft), rgba(15, 18, 23, 0.88));
  }

  .power-slider.is-dragging::before,
  .power-slider.is-dragging .power-slider-knob { transition: none; }

  .footer-row {
    gap: 8px;
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 10px;
  }

  .login-title {
    margin: 6px 0 0;
    font-size: clamp(28px, 8vw, 40px);
    line-height: 0.9;
    letter-spacing: -0.06em;
  }

  .login-copy {
    margin: 9px 0 0;
    color: var(--text-soft);
    font-size: 12px;
    line-height: 1.55;
  }

  .login-form {
    display: grid;
    gap: 8px;
    margin-top: 14px;
  }

  .password-input {
    width: 100%;
    min-height: 40px;
    padding: 0 11px;
    border: 1px solid var(--card-border);
    border-radius: 5px;
    color: var(--text-main);
    background: rgba(15, 18, 23, 0.84);
    outline: none;
  }

  .status-line {
    min-height: 18px;
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 10px;
  }

  .hidden { display: none !important; }

  @supports not (color: color-mix(in srgb, red, white)) {
    .control-row.is-active,
    .power-slider.power-on { border-color: rgba(103, 118, 137, 0.42); }
    .switch input:checked + span { border-color: rgba(103, 118, 137, 0.42); }
    .power-slider-knob { background: linear-gradient(135deg, #17202a, #090b0e); }
  }

  @media (max-width: 760px) {
    .app-shell {
      width: min(100%, 500px);
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 560px) {
    body { padding: 10px; }
    .app-shell,
    .login-shell { padding: 12px; border-radius: 8px; }
    .panel-header { align-items: flex-start; }
    .header-meta { gap: 6px; }
    .last-updated { font-size: 10px; }
    .card { padding: 10px; border-radius: 6px; }
    .status-card { padding: 12px; }
    .status-title { font-size: clamp(30px, 10vw, 42px); }
    .readout-grid { grid-template-columns: 1fr; gap: 8px; }
    .readout { min-height: 46px; padding: 8px 10px; }
    .action-grid { grid-template-columns: 1fr; gap: 8px; }
    .action-button { min-height: 46px; }
    .control-row { min-height: 52px; padding: 9px 10px; border-radius: 5px; }
    .control-icon { width: 28px; height: 28px; border-radius: 4px; }
    .power-slider { --power-knob-size: 38px; min-height: 56px; padding: 8px 11px 8px 52px; border-radius: 5px; }
  }

  :root {
    --page-bg: #030406;
    --page-glow: rgba(33, 43, 55, 0.18);
    --panel-bg: #080b0f;
    --panel-border: #26313b;
    --card-bg: #0d1218;
    --card-bg-strong: #111821;
    --card-border: #25313c;
    --text-main: #e4e9ef;
    --text-soft: #a8b1bd;
    --text-muted: #65707d;
    --accent-contrast: #eaf3f7;
    --cool: #5798b4;
    --cool-soft: rgba(49, 104, 132, 0.26);
    --rest: #a7743c;
    --rest-soft: rgba(116, 76, 35, 0.26);
    --danger: #b35d5d;
    --danger-soft: rgba(116, 47, 47, 0.26);
  }

  body[data-phase="cooling"] { --page-glow: rgba(46, 91, 116, 0.2); }
  body[data-phase="resting"] { --page-glow: rgba(116, 76, 35, 0.17); }
  body[data-phase="off"] { --page-glow: rgba(116, 47, 47, 0.16); }

  body {
    background:
      linear-gradient(rgba(107, 123, 143, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(107, 123, 143, 0.035) 1px, transparent 1px),
      radial-gradient(circle at 50% -22%, var(--page-glow), transparent 38%),
      linear-gradient(180deg, #06080b 0%, var(--page-bg) 58%, #010203 100%);
    background-size: 28px 28px, 28px 28px, auto, auto;
  }

  .app-shell,
  .login-shell {
    width: min(100%, 760px);
    padding: 12px;
    border-color: var(--panel-border);
    border-radius: 4px;
    background: var(--panel-bg);
    box-shadow: 0 18px 55px rgba(0, 0, 0, 0.52), inset 0 1px 0 rgba(145, 162, 184, 0.06);
    backdrop-filter: none;
  }

  .app-shell {
    grid-template-columns: minmax(0, 1.08fr) minmax(252px, 0.92fr);
    gap: 10px;
  }

  .app-shell[data-phase="cooling"],
  .app-shell[data-phase="resting"],
  .app-shell[data-phase="off"] {
    --phase-contrast: #edf3f7;
  }

  .card,
  .panel-header {
    border: 1px solid var(--card-border);
    border-radius: 3px;
    background: var(--card-bg);
    box-shadow: none;
  }

  .card { padding: 12px; }

  .panel-header {
    padding: 11px 12px;
    background: #0b1016;
  }

  .panel-header h1 {
    margin-top: 3px;
    font-size: clamp(17px, 3vw, 21px);
    font-weight: 780;
    letter-spacing: 0.015em;
    line-height: 1.05;
    text-transform: uppercase;
  }

  .metric-label,
  .section-label,
  .login-label,
  .eyebrow,
  .environment-badge,
  .phase-chip,
  .section-note,
  .last-updated {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }

  .environment-badge,
  .phase-chip {
    min-height: 24px;
    border-color: #2a3743;
    border-radius: 2px;
    background: #0f151c;
    color: var(--text-soft);
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .environment-badge::before,
  .phase-dot {
    width: 6px;
    height: 6px;
    border-radius: 1px;
    box-shadow: none;
  }

  .status-card {
    padding: 13px;
    border-left: 3px solid var(--phase);
  }

  .status-card::before { display: none; }

  .status-topline {
    padding-bottom: 10px;
    border-bottom: 1px solid #202a34;
  }

  .phase-chip {
    color: var(--phase);
    background: #10161d;
  }

  .metric-label,
  .section-label,

<script>
  const POWER_SLIDE_THRESHOLD = 0.95;
  let latestState = null;
  let refreshTimer = null;
  const powerSliderState = { dragging: false, pointerId: null, startX: 0, progress: 0, busy: false };

  const loginShell = document.getElementById('loginShell');
  const appShell = document.getElementById('appShell');
  const loginForm = document.getElementById('loginForm');
  const loginStatus = document.getElementById('loginStatus');
  const passwordInput = document.getElementById('passwordInput');
  const statusLine = document.getElementById('statusLine');

  function showLogin(message) {
    appShell.classList.add('hidden');
    loginShell.classList.remove('hidden');
    document.body.removeAttribute('data-phase');
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = null;
    if (message) loginStatus.textContent = message;
    passwordInput.focus();
  }

  function showApp() {
    loginShell.classList.add('hidden');
    appShell.classList.remove('hidden');
  }

  async function requestJson(path, options) {
    const response = await fetch(path, {
      credentials: 'same-origin',
      headers: { Accept: 'application/json', ...(options && options.headers ? options.headers : {}) },
      ...options,
    });
    const data = await response.json().catch(() => ({}));
    if (response.status === 401) {
      showLogin('Login required.');
      throw new Error(data.error || 'Login required.');
    }
    if (!response.ok || data.ok === false) throw new Error(data.error || 'Request failed.');
    return data;
  }

  function setStatus(message) {
    statusLine.textContent = message || 'Ready';
  }

  function formatRemaining(seconds) {
    if (seconds === null || seconds === undefined) return '--:--';
    const total = Math.max(0, Math.floor(seconds));
    const minutes = String(Math.floor(total / 60)).padStart(2, '0');
    const secs = String(total % 60).padStart(2, '0');
    return minutes + ':' + secs;
  }

  function formatFahrenheit(value) {
    return Number.isFinite(value) ? Math.round(value) + 'F' : '--';
  }

  function normalizePhase(state) {
    const phase = String(state && state.phase ? state.phase : 'stopped').toLowerCase();
    return phase === 'cooling' || phase === 'resting' ? phase : 'stopped';
  }

  function phaseLabel(phase) {
    if (phase === 'cooling') return 'Cooling';
    if (phase === 'resting') return 'Resting';
    return 'Stopped';
  }

  function cycleTargetForPhase(state, phase) {
    const cycle = state && state.cycle ? state.cycle : {};
    if (phase === 'cooling') return Number(cycle.cooling_setpoint_f);
    if (phase === 'resting') return Number(cycle.resting_setpoint_f);
    return NaN;
  }

  function statusSubtitle(state, powered, phase, targetF) {
    if (!powered) return 'AC power is off. Tap power to turn it on.';
    if (!state.running) return 'Ready for a cycle.';
    if (phase === 'cooling') return 'Cooling toward ' + formatFahrenheit(targetF) + '.';
    if (phase === 'resting') return 'Resting at ' + formatFahrenheit(targetF) + '.';
    return 'Cycle is active.';
  }

  function updateLastUpdated() {
    const lastUpdated = document.getElementById('lastUpdated');
    if (!lastUpdated) return;
    lastUpdated.textContent = new Date().toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
    });
  }

  function renderTemperature(temp, powered) {
    const value = Number(temp && temp.fahrenheit);
    document.getElementById('activeTempF').textContent = powered ? formatFahrenheit(value) : '--';
  }

  function renderState(state) {
    if (!state) return;
    latestState = state;
    const powered = Boolean(state.power_switch);
    const phase = normalizePhase(state);
    const visualPhase = powered ? phase : 'off';
    const activeTempF = Number(state.active_temperature && state.active_temperature.fahrenheit);
    const coolingSetpointF = Number(state.cycle && state.cycle.cooling_setpoint_f);
    const restingSetpointF = Number(state.cycle && state.cycle.resting_setpoint_f);
    const targetF = cycleTargetForPhase(state, phase);

    appShell.dataset.phase = visualPhase;
    document.body.dataset.phase = visualPhase;
    renderTemperature(state.active_temperature, powered);
    document.getElementById('phase').textContent = powered ? phaseLabel(phase) : 'Power Off';
    document.getElementById('statusTitle').textContent = powered ? phaseLabel(phase) : 'Power Off';
    document.getElementById('statusSubtitle').textContent = statusSubtitle(state, powered, phase, targetF);
    document.getElementById('remaining').textContent = formatRemaining(state.remaining_seconds);
    document.getElementById('targetTempF').textContent = powered && state.running ? formatFahrenheit(targetF) : '--';
    document.getElementById('startBtn').disabled = Boolean(state.running) || !powered;
    document.getElementById('stopBtn').disabled = !state.running;

    const compressorOn = Number.isFinite(activeTempF) && Number.isFinite(coolingSetpointF) && Math.abs(activeTempF - coolingSetpointF) < 0.5;
    const compressorControl = document.getElementById('compressorControl');
    const compressorToggle = document.getElementById('compressorToggle');
    const compressorState = document.getElementById('compressorState');
    compressorToggle.checked = powered && compressorOn;
    compressorControl.classList.toggle('is-active', powered && compressorOn);
    compressorControl.classList.toggle('is-disabled', !powered);
    compressorControl.disabled = !powered;
    compressorControl.title = powered ? (compressorOn ? 'Set to ' + formatFahrenheit(restingSetpointF) + '.' : 'Set to ' + formatFahrenheit(coolingSetpointF) + '.') : 'Turn AC on first.';
    compressorState.textContent = '';

    const swingToggle = document.getElementById('swingToggle');
    const swingControl = document.getElementById('swingControl');
    swingToggle.checked = powered && Boolean(state.swing_wind);
    swingControl.classList.toggle('is-active', powered && Boolean(state.swing_wind));
    swingControl.classList.toggle('is-disabled', !powered);
    swingControl.disabled = !powered;
    document.getElementById('swingState').textContent = '';
    document.getElementById('manualNote').textContent = powered ? 'Ready' : 'Power off';

    renderPowerSlider();
    updateLastUpdated();
    if (state.last_error) setStatus(state.last_error);
  }

  async function loadState() {
    const data = await requestJson('/api/state');
    renderState(data.state);
  }

  async function readDeviceStatus() {
    setStatus('Refreshing...');
    const data = await requestJson('/api/device-status');
    renderState(data.state);
    setStatus('Device refreshed.');
  }

  async function postAction(path, body) {
    setStatus('Sending...');
    try {
      const data = await requestJson(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      renderState(data.state);
      setStatus(data.message || 'Done.');
    } catch (error) {
      setStatus(error.message);
      await loadState().catch(() => {});
    }
  }

  async function toggleCompressor() {
    if (!latestState || !latestState.power_switch) return;
    const isCooling = Boolean(document.getElementById('compressorToggle').checked);
    await postAction('/api/phase', { phase: isCooling ? 'resting' : 'cooling' });
  }

  async function toggleSwing() {
    if (!latestState || !latestState.power_switch) return;
    await postAction('/api/swing', { enabled: !latestState.swing_wind });
  }

  async function togglePower() {
    if (powerSliderState.busy) return;
    powerSliderState.busy = true;
    renderPowerSlider();
    try {
      await postAction('/api/power', { enabled: !(latestState && latestState.power_switch) });
    } finally {
      powerSliderState.busy = false;
      resetPowerSlider();
      renderPowerSlider();
    }
  }

  function powerSliderElements() {
    return { slider: document.getElementById('powerButton'), knob: document.getElementById('powerButtonIcon') };
  }

  function powerSliderMaxTravel(slider, knob) {
    return Math.max(1, slider.clientWidth - knob.clientWidth - 10);
  }

  function setPowerSliderProgress(progress) {
    const clamped = Math.max(0, Math.min(1, progress));
    powerSliderState.progress = clamped;
    updatePowerSliderLabel();
  }

  function resetPowerSlider() {
    setPowerSliderProgress(0);
  }

  function updatePowerSliderLabel() {
    const label = document.getElementById('powerLabel');
    const hint = document.getElementById('powerHint');
    const on = latestState && latestState.power_switch;
    const { slider } = powerSliderElements();
    if (!label || !hint) {
      if (slider) slider.title = on ? 'Turn AC power off' : 'Turn AC power on';
      return;
    }
    if (powerSliderState.busy) {
      label.textContent = 'Sending...';
      hint.textContent = 'Waiting for device confirmation.';
      return;
    }
    if (powerSliderState.dragging) {
      label.textContent = powerSliderState.progress >= POWER_SLIDE_THRESHOLD ? 'Release to confirm' : 'Keep sliding';
      hint.textContent = on ? 'Confirm power off.' : 'Confirm power on.';
      return;
    }
    label.textContent = on ? 'Slide to power off' : 'Slide to power on';
    hint.textContent = on ? 'Power is on.' : 'Power is off.';
  }

  function renderPowerSlider() {
    const { slider } = powerSliderElements();
    if (!slider) return;
    const on = latestState && latestState.power_switch;
    slider.classList.toggle('power-on', Boolean(on));
    slider.classList.toggle('power-off', !on);
    slider.classList.toggle('is-busy', powerSliderState.busy);
    slider.disabled = powerSliderState.busy;
    slider.setAttribute('aria-label', on ? 'Turn AC power off' : 'Turn AC power on');
    slider.setAttribute('aria-pressed', on ? 'true' : 'false');
    slider.title = on ? 'Turn AC power off' : 'Turn AC power on';
    updatePowerSliderLabel();
  }

  function beginPowerDrag(event) {
    if (powerSliderState.busy || (event.button !== undefined && event.button !== 0)) return;
    const { slider } = powerSliderElements();
    if (!slider || !(event.target instanceof Element) || !event.target.closest('.power-slider-knob')) return;
    powerSliderState.dragging = true;
    powerSliderState.pointerId = event.pointerId;
    powerSliderState.startX = event.clientX;
    slider.classList.add('is-dragging');
    slider.setPointerCapture(event.pointerId);
    setPowerSliderProgress(0);
    event.preventDefault();
  }

  function movePowerDrag(event) {
    if (!powerSliderState.dragging || event.pointerId !== powerSliderState.pointerId) return;
    const { slider, knob } = powerSliderElements();
    const distance = Math.max(0, event.clientX - powerSliderState.startX);
    setPowerSliderProgress(distance / powerSliderMaxTravel(slider, knob));
  }

  function finishPowerDrag(event, cancelled) {
    if (!powerSliderState.dragging || event.pointerId !== powerSliderState.pointerId) return;
    const { slider } = powerSliderElements();
    powerSliderState.dragging = false;
    powerSliderState.pointerId = null;
    if (slider) {
      slider.classList.remove('is-dragging');
      if (slider.hasPointerCapture(event.pointerId)) slider.releasePointerCapture(event.pointerId);
    }
    if (!cancelled && powerSliderState.progress >= POWER_SLIDE_THRESHOLD) {
      setPowerSliderProgress(1);
      togglePower();
      return;
    }
    resetPowerSlider();
  }

  async function init() {
    setEnvironmentBadge();
    const session = await fetch('/api/session', { credentials: 'same-origin' }).then((r) => r.json()).catch(() => ({ authenticated: false }));
    if (!session.authenticated) {
      showLogin();
      return;
    }
    showApp();
    await loadState();
    refreshTimer = setInterval(() => loadState().catch(() => {}), 5000);
  }

  function setEnvironmentBadge() {
    const badge = document.getElementById('environmentBadge');
    if (!badge) return;
    const host = window.location.hostname;
    const local = host === 'localhost' || host === '127.0.0.1' || host === '';
    badge.textContent = local ? 'Local Preview' : 'Online';
    badge.classList.toggle('is-local', local);
  }

  loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    loginStatus.textContent = 'Signing in...';
    try {
      await requestJson('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: passwordInput.value }),
      });
      passwordInput.value = '';
      showApp();
      await loadState();
      refreshTimer = setInterval(() => loadState().catch(() => {}), 5000);
    } catch (error) {
      loginStatus.textContent = error.message || 'Login failed.';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
    showLogin('Logged out.');
  });
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.addEventListener('click', () => readDeviceStatus().catch((error) => setStatus(error.message)));
  document.getElementById('startBtn').addEventListener('click', () => postAction('/api/start'));
  document.getElementById('stopBtn').addEventListener('click', () => postAction('/api/stop'));
  document.getElementById('compressorControl').addEventListener('click', toggleCompressor);
  document.getElementById('swingControl').addEventListener('click', toggleSwing);

  const { slider } = powerSliderElements();
  if (slider) slider.addEventListener('click', togglePower);

  init();
</script>
</body>
</html>
