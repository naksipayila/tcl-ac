<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="theme-color" content="#080a0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Home Control">
<title>Home Control</title>
<style>
  * { box-sizing: border-box; }

  :root {
    color-scheme: dark;
    --page-bg: #030405;
    --page-glow: rgba(50, 60, 72, 0.18);
    --panel-bg: rgba(7, 8, 10, 0.96);
    --panel-border: rgba(102, 118, 138, 0.34);
    --card-bg: rgba(18, 21, 26, 0.78);
    --card-bg-strong: rgba(24, 29, 36, 0.86);
    --card-border: rgba(103, 118, 137, 0.28);
    --text-main: #e9edf3;
    --text-soft: #b2bac6;
    --text-muted: #68717f;
    --accent-contrast: #eaf6fb;
    --cool: #3d9cc3;
    --cool-soft: rgba(41, 115, 151, 0.28);
    --rest: #b77933;
    --rest-soft: rgba(130, 82, 31, 0.28);
    --danger: #bf5454;
    --danger-soft: rgba(132, 45, 45, 0.28);
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  body[data-phase="cooling"] { --page-glow: rgba(39, 109, 146, 0.22); }
  body[data-phase="resting"] { --page-glow: rgba(133, 82, 28, 0.2); }
  body[data-phase="off"] { --page-glow: rgba(128, 42, 42, 0.18); }

  body {
    min-height: 100svh;
    margin: 0;
    display: grid;
    place-items: center;
    padding: 12px 10px;
    color: var(--text-main);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 50% -18%, var(--page-glow), transparent 34%),
      radial-gradient(circle at 92% 10%, rgba(63, 76, 91, 0.12), transparent 28%),
      radial-gradient(circle at 5% 90%, rgba(55, 63, 74, 0.1), transparent 30%),
      linear-gradient(180deg, #07080a 0%, var(--page-bg) 58%, #010101 100%);
  }

  button,
  input { font: inherit; }

  button {
    appearance: none;
    border: 0;
    cursor: pointer;
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--phase, var(--cool));
    outline-offset: 3px;
  }

  .page-stack {
    width: min(100%, 386px);
    display: grid;
    justify-items: center;
    gap: 8px;
  }

  .app-shell,
  .login-shell {
    width: min(100%, 760px);
    padding: 16px;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(65, 78, 94, 0.14), rgba(9, 11, 14, 0.18) 44%, rgba(29, 35, 43, 0.16)),
      var(--panel-bg);
    box-shadow:
      0 22px 70px rgba(0, 0, 0, 0.62),
      inset 0 1px 0 rgba(143, 163, 188, 0.08);
    backdrop-filter: blur(18px);
  }

  .app-shell {
    --phase: #788493;
    --phase-soft: rgba(86, 96, 109, 0.18);
    --phase-contrast: #ecf1f6;
    display: grid;
    grid-template-columns: 1fr;
    align-items: start;
    gap: 9px;
  }

  .app-shell[data-phase="cooling"] {
    --phase: var(--cool);
    --phase-soft: var(--cool-soft);
    --phase-contrast: #eef9ff;
  }

  .app-shell[data-phase="resting"] {
    --phase: var(--rest);
    --phase-soft: var(--rest-soft);
    --phase-contrast: #fff3e2;
  }

  .app-shell[data-phase="off"] {
    --phase: var(--danger);
    --phase-soft: var(--danger-soft);
    --phase-contrast: #ffecec;
  }

  .login-shell { max-width: 360px; }

  .card {
    width: 100%;
    margin: 0 auto;
    padding: 12px;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background:
      linear-gradient(180deg, rgba(60, 70, 84, 0.16), rgba(8, 10, 13, 0.08)),
      var(--card-bg);
    box-shadow:
      inset 0 1px 0 rgba(139, 158, 184, 0.07),
      0 14px 38px rgba(0, 0, 0, 0.22);
  }

  .status-topline,
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .phase-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 26px;
    padding: 0 9px;
    border: 1px solid rgba(103, 118, 137, 0.28);
    border-radius: 5px;
    color: var(--text-soft);
    background: rgba(16, 19, 24, 0.82);
    font-size: 10px;
    font-weight: 760;
  }

  .phase-dot {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: var(--phase, #aeb6c2);
    box-shadow: 0 0 12px var(--phase, rgba(120, 132, 147, 0.3));
  }

  .status-card {
    position: relative;
    overflow: hidden;
    padding: 14px;
  }

  .status-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    background:
      radial-gradient(circle at 22% 0%, var(--phase-soft), transparent 34%),
      radial-gradient(circle at 96% 18%, rgba(82, 96, 116, 0.14), transparent 24%);
    pointer-events: none;
  }

  .status-card > * {
    position: relative;
    z-index: 1;
  }

  .status-topline { gap: 8px; }

  .phase-chip {
    color: var(--phase);
    background: linear-gradient(180deg, var(--phase-soft), rgba(10, 12, 15, 0.7));
  }

  .metric-label,
  .section-label,
  .login-label,
  .eyebrow {
    margin: 0;
    color: var(--text-muted);
    font-size: 8px;
    font-weight: 780;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .hero-status {
    margin: 14px 0 12px;
  }

  .status-title {
    margin: 4px 0 0;
    color: var(--text-main);
    font-size: clamp(30px, 7vw, 48px);
    font-weight: 820;
    line-height: 0.9;
    letter-spacing: -0.065em;
  }

  .readout-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 7px;
  }

  .readout {
    min-height: 50px;
    padding: 9px 10px;
    border: 1px solid rgba(103, 118, 137, 0.22);
    border-radius: 5px;
    background: rgba(3, 5, 7, 0.36);
  }

  .metric-value {
    display: block;
    margin-top: 4px;
    overflow: hidden;
    color: var(--text-main);
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: 800;
    letter-spacing: -0.04em;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .logout-button {
    flex: 0 0 auto;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid var(--card-border);
    border-radius: 4px;
    background: rgba(18, 21, 26, 0.82);
    color: var(--text-soft);
    font-size: 10px;
    font-weight: 760;
    transition: transform 0.18s var(--ease), border-color 0.18s var(--ease), background 0.18s var(--ease);
  }

  .logout-button:hover {
    border-color: rgba(118, 136, 158, 0.42);
    background: rgba(26, 31, 38, 0.92);
  }

  .action-grid {
    display: grid;
    grid-template-columns: 1.18fr 0.82fr;
    gap: 7px;
    margin-top: 10px;
  }

  .action-button,
  .login-button {
    width: 100%;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 9px;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text-main);
    background: var(--card-bg);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: -0.01em;
    transition: transform 0.18s var(--ease), opacity 0.18s var(--ease), background 0.18s var(--ease), border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }

  .action-button:not(:disabled):hover,
  .login-button:not(:disabled):hover,
  .control-row:not(:disabled):hover {
    transform: translateY(-1px);
  }

  .action-primary,
  .login-button {
    color: var(--accent-contrast);
    border-color: rgba(61, 156, 195, 0.46);
    background: linear-gradient(135deg, rgba(61, 156, 195, 0.34), rgba(17, 28, 36, 0.96));
    box-shadow: 0 12px 30px rgba(24, 88, 119, 0.2);
  }

  .action-danger {
    border-color: rgba(191, 84, 84, 0.35);
    color: #f2c6c6;
    background: linear-gradient(135deg, rgba(128, 42, 42, 0.3), rgba(18, 21, 26, 0.86));
  }

  .action-danger:not(:disabled):hover {
    border-color: rgba(191, 84, 84, 0.6);
    background: linear-gradient(135deg, rgba(148, 49, 49, 0.36), rgba(22, 25, 31, 0.9));
  }

  .action-button:disabled,
  .control-row.is-disabled {
    opacity: 0.44;
    cursor: not-allowed;
  }

  .controls-card {
    padding: 11px;
    align-self: stretch;
    display: flex;
    flex-direction: column;
  }

  .control-list {
    display: grid;
    flex: 1;
    gap: 7px;
  }

  .control-row {
    width: 100%;
    min-height: 50px;
    gap: 9px;
    padding: 9px 11px;
    border: 1px solid var(--card-border);
    border-radius: 5px;
    background: rgba(15, 18, 23, 0.84);
    color: inherit;
    text-align: left;
    transition: transform 0.18s var(--ease), background 0.18s var(--ease), border-color 0.18s var(--ease), opacity 0.18s var(--ease);
  }

  .control-row.is-active {
    border-color: color-mix(in srgb, var(--phase) 46%, rgba(103, 118, 137, 0.24));
    background: linear-gradient(135deg, var(--phase-soft), rgba(15, 18, 23, 0.88));
  }

  .control-main {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .control-icon {
    position: relative;
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(103, 118, 137, 0.24);
    border-radius: 4px;
    background: rgba(3, 5, 7, 0.42);
  }

  .control-icon::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--text-muted);
    box-shadow: 0 0 0 rgba(255, 255, 255, 0);
  }

  .control-row.is-active .control-icon::before {
    background: var(--phase);
    box-shadow: 0 0 18px var(--phase);
  }

  .control-copy { min-width: 0; }

  .control-title {
    display: block;
    color: var(--text-main);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: -0.015em;
  }

  .control-meta {
    display: block;
    margin-top: 3px;
    overflow: hidden;
    color: var(--text-muted);
    font-size: 10px;
    line-height: 1.35;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .switch {
    position: relative;
    flex: 0 0 auto;
    width: 38px;
    height: 22px;
  }

  .switch input {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
  }

  .switch span {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(103, 118, 137, 0.28);
    border-radius: 5px;
    background: rgba(5, 7, 10, 0.72);
    transition: background 0.18s var(--ease), border-color 0.18s var(--ease);
  }

  .switch span::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    background: #aeb7c2;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.34);
    transition: transform 0.18s var(--ease);
  }

  .switch input:checked + span {
    border-color: color-mix(in srgb, var(--phase) 55%, rgba(255, 255, 255, 0.25));
    background: linear-gradient(135deg, color-mix(in srgb, var(--phase) 68%, #111820), rgba(12, 16, 21, 0.92));
  }

  .switch input:checked + span::after { transform: translateX(16px); }

  .login-title {
    margin: 6px 0 0;
    font-size: clamp(28px, 8vw, 40px);
    line-height: 0.9;
    letter-spacing: -0.06em;
  }

  .login-form {
    display: grid;
    gap: 8px;
    margin-top: 14px;
  }

  .password-input {
    width: 100%;
    min-height: 40px;
    padding: 0 11px;
    border: 1px solid var(--card-border);
    border-radius: 5px;
    color: var(--text-main);
    background: rgba(15, 18, 23, 0.84);
    outline: none;
  }

  .hidden { display: none !important; }

  @supports not (color: color-mix(in srgb, red, white)) {
    .control-row.is-active { border-color: rgba(103, 118, 137, 0.42); }
    .switch input:checked + span { border-color: rgba(103, 118, 137, 0.42); }
  }

  @media (max-width: 760px) {
    .app-shell {
      width: min(100%, 500px);
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 560px) {
    body { padding: 10px; }
    .app-shell,
    .login-shell { padding: 12px; border-radius: 8px; }
    .card { padding: 10px; border-radius: 6px; }
    .status-card { padding: 12px; }
    .status-title { font-size: clamp(30px, 10vw, 42px); }
    .readout-grid { grid-template-columns: 1fr; gap: 8px; }
    .readout { min-height: 46px; padding: 8px 10px; }
    .action-grid { grid-template-columns: 1fr; gap: 8px; }
    .action-button { min-height: 46px; }
    .control-row { min-height: 52px; padding: 9px 10px; border-radius: 5px; }
    .control-icon { width: 28px; height: 28px; border-radius: 4px; }
  }

  :root {
    --page-bg: #030406;
    --page-glow: rgba(33, 43, 55, 0.18);
    --panel-bg: #080b0f;
    --panel-border: #26313b;
    --card-bg: #0d1218;
    --card-bg-strong: #111821;
    --card-border: #25313c;
    --text-main: #e4e9ef;
    --text-soft: #a8b1bd;

    --accent-contrast: #eaf3f7;
    --cool: #5798b4;

  }

  body[data-phase="resting"] { --page-glow: rgba(116, 76, 35, 0.17); }
  body[data-phase="off"] { --page-glow: rgba(116, 47, 47, 0.16); }

  body {
    background:
      linear-gradient(rgba(107, 123, 143, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(107, 123, 143, 0.035) 1px, transparent 1px),

      linear-gradient(180deg, #06080b 0%, var(--page-bg) 58%, #010203 100%);
    background-size: 28px 28px, 28px 28px, auto, auto;
  }

  }

  }

  .app-shell[data-phase="cooling"],
  .app-shell[data-phase="resting"],

    --phase-contrast: #edf3f7;
  }

  }

  .section-label,

  }

  </main>

      <button id="pcTab" class="view-tab" type="button" aria-pressed="false">PC<span class="right-curve" aria-hidden="true"></span></button>

        <path d="M14 8l4 4-4 4" />
        <path d="M18 12H9" />
      </svg>
    </button>

    <section class="card status-card ac-panel" aria-label="AC status">
      <div class="status-topline">
        <button id="powerButton" class="power-button power-off" type="button" aria-label="Toggle AC power" title="Toggle AC power">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3v8" />
            <path d="M7.05 7.05a7 7 0 1 0 9.9 0" />
          </svg>
        </button>

      <div class="hero-status">
        <span id="phaseChip" class="phase-chip hero-phase-chip"><span class="phase-dot" aria-hidden="true"></span><span id="phase">Stopped</span></span>
        <p id="statusLabel" class="metric-label">Device Status</p>
        <h2 id="statusTitle" class="status-title">Stopped</h2>

            <span class="control-copy">
              <span class="control-title">Swing</span>
            </span>
          </span>
          <span class="switch" aria-hidden="true"><input id="swingToggle" type="checkbox" tabindex="-1"><span></span></span>

      </div>

        <h2 id="relayText" class="status-title">Checking</h2>
      </div>
      <div class="action-grid" aria-label="PC actions">
        <button id="wakePcBtn" class="action-button action-primary" type="button" disabled>Wake</button>
      </div>
      <p id="pcStatusDetail" class="pc-status-detail" role="status" aria-live="polite">Status not checked.</p>
    </section>
  </main>

  <div id="statusToast" class="status-toast hidden" role="status" aria-live="polite"></div>
  </div>

<script>
  const STATE_REFRESH_MS = 1000;
  const WOL_REFRESH_MS = 3000;
  const TAB_SWIPE_MIN_DISTANCE = 64;
  const TAB_SWIPE_MAX_VERTICAL = 72;
  const TAB_SWIPE_DIRECTION_RATIO = 1.35;
  let currentView = 'ac';
  let latestState = null;
  let latestWolStatus = null;
  let refreshTimer = null;
  let wolRefreshTimer = null;
  let statusToastTimer = null;
  let wolWakeBusy = false;
  let deviceProbeBusy = false;
  let acActionBusy = false;
  let powerButtonBusy = false;
  const tabSwipeState = { active: false, pointerId: null, startX: 0, startY: 0, lastX: 0, lastY: 0, suppressClickUntil: 0 };

  const loginShell = document.getElementById('loginShell');
  const appShell = document.getElementById('appShell');
  const loginForm = document.getElementById('loginForm');
  const passwordInput = document.getElementById('passwordInput');
  const statusToast = document.getElementById('statusToast');
  const acTab = document.getElementById('acTab');
  const pcTab = document.getElementById('pcTab');
  const pcCard = document.getElementById('pcCard');

  function showLogin(message) {
    currentView = 'ac';
    appShell.classList.add('hidden');
    loginShell.classList.remove('hidden');
    document.body.removeAttribute('data-phase');
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = null;
    stopWolRefresh();
    if (message) setStatus(message);
    passwordInput.focus();
  }

  function showApp() {
    loginShell.classList.add('hidden');
    appShell.classList.remove('hidden');
    renderPanelView();
  }

  function renderPanelView() {
    const showPc = currentView === 'pc';
    appShell.dataset.view = showPc ? 'pc' : 'ac';
    document.querySelectorAll('.ac-panel').forEach((panel) => panel.classList.toggle('hidden', showPc));
    if (pcCard) pcCard.classList.toggle('hidden', !showPc);
    if (acTab) {
      acTab.classList.toggle('is-active', !showPc);
      acTab.setAttribute('aria-pressed', showPc ? 'false' : 'true');
    }
    if (pcTab) {
      pcTab.classList.toggle('is-active', showPc);
      pcTab.setAttribute('aria-pressed', showPc ? 'true' : 'false');
    }
    if (showPc) {
      loadWolStatus().catch((error) => setStatus(error.message, true));
      startWolRefresh();
    } else {
      stopWolRefresh();
    }
  }

  function setPanelView(view) {
    currentView = view === 'pc' ? 'pc' : 'ac';
    renderPanelView();
  }

  function beginTabSwipe(event) {
    if (event.pointerType !== 'touch' || event.isPrimary === false || appShell.classList.contains('hidden')) return;
    tabSwipeState.active = true;
    tabSwipeState.pointerId = event.pointerId;
    tabSwipeState.startX = event.clientX;
    tabSwipeState.startY = event.clientY;
    tabSwipeState.lastX = event.clientX;
    tabSwipeState.lastY = event.clientY;
  }

  function moveTabSwipe(event) {
    if (!tabSwipeState.active || event.pointerId !== tabSwipeState.pointerId) return;
    tabSwipeState.lastX = event.clientX;
    tabSwipeState.lastY = event.clientY;
  }

  function finishTabSwipe(event) {
    if (!tabSwipeState.active || event.pointerId !== tabSwipeState.pointerId) return;
    tabSwipeState.lastX = event.clientX;
    tabSwipeState.lastY = event.clientY;
    const deltaX = tabSwipeState.lastX - tabSwipeState.startX;
    const deltaY = tabSwipeState.lastY - tabSwipeState.startY;
    const absX = Math.abs(deltaX);
    const absY = Math.abs(deltaY);
    tabSwipeState.active = false;
    tabSwipeState.pointerId = null;
    if (absX < TAB_SWIPE_MIN_DISTANCE || absY > TAB_SWIPE_MAX_VERTICAL || absX < absY * TAB_SWIPE_DIRECTION_RATIO) return;
    const nextView = deltaX < 0 ? 'pc' : 'ac';
    if (nextView === currentView) return;
    tabSwipeState.suppressClickUntil = Date.now() + 450;
    if (event.cancelable) event.preventDefault();
    setPanelView(nextView);
  }

  function cancelTabSwipe(event) {
    if (!tabSwipeState.active || event.pointerId !== tabSwipeState.pointerId) return;
    tabSwipeState.active = false;
    tabSwipeState.pointerId = null;
  }

  function suppressClickAfterTabSwipe(event) {
    if (Date.now() > tabSwipeState.suppressClickUntil) return;
    tabSwipeState.suppressClickUntil = 0;
    event.preventDefault();
    event.stopPropagation();
  }

  async function requestJson(path, options) {
    const response = await fetch(path, {
      credentials: 'same-origin',
      headers: { Accept: 'application/json', ...(options && options.headers ? options.headers : {}) },
      ...options,
    });
    const data = await response.json().catch(() => ({}));
    if (response.status === 401) {
      showLogin('Login required.');
      throw new Error(data.error || 'Login required.');
    }
    if (!response.ok || data.ok === false) {
      const error = new Error(data.error || 'Request failed.');
      error.silent = Boolean(data.silent);
      throw error;
    }
    return data;
  }

  function setStatus(message, isError) {
    const text = String(message || '').trim();
    if (!text || text === 'Ready') return;
    statusToast.textContent = text;
    statusToast.classList.toggle('is-error', Boolean(isError));
    statusToast.setAttribute('role', isError ? 'alert' : 'status');
    statusToast.classList.remove('hidden');
    if (statusToastTimer) clearTimeout(statusToastTimer);
    statusToastTimer = setTimeout(() => {
      statusToast.classList.add('hidden');
      statusToast.classList.remove('is-error');
      statusToast.setAttribute('role', 'status');
    }, isError ? 4200 : 2400);
  }

  function formatRemaining(seconds) {
    if (seconds === null || seconds === undefined) return '--:--';
    const total = Math.max(0, Math.floor(seconds));
    const minutes = String(Math.floor(total / 60)).padStart(2, '0');
    const secs = String(total % 60).padStart(2, '0');
    return minutes + ':' + secs;
  }

  function startStateRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => loadState().catch(() => {}), STATE_REFRESH_MS);
  }

  function startWolRefresh() {
    if (wolRefreshTimer) clearInterval(wolRefreshTimer);
    wolRefreshTimer = setInterval(() => loadWolStatus().catch(() => {}), WOL_REFRESH_MS);
  }

  function stopWolRefresh() {
    if (wolRefreshTimer) clearInterval(wolRefreshTimer);
    wolRefreshTimer = null;
  }

  function applyPcStatusDetail(detail) {
    const pcStatusDetailEl = document.getElementById('pcStatusDetail');
    if (!pcStatusDetailEl) return;
    pcStatusDetailEl.textContent = detail.text;
    pcStatusDetailEl.classList.toggle('is-good', detail.tone === 'is-good');
    pcStatusDetailEl.classList.toggle('is-warn', detail.tone === 'is-warn');
    pcStatusDetailEl.classList.toggle('is-error', detail.tone === 'is-error');
  }

  function pcStatusDetail(status) {
    if (!status) return { text: 'Status not checked.', tone: '' };
    const relayOnline = Boolean(status.relay && status.relay.online);
    const command = status.command;
    const commandStatus = String(command && command.status || '').toLowerCase();
    if (commandStatus === 'succeeded') return { text: 'PC may be awake now.', tone: 'is-warn' };
    if (commandStatus === 'failed') return { text: command.message || 'Wake command failed.', tone: 'is-error' };
    if (commandStatus === 'claimed') return { text: 'Wake picked up by relay.', tone: 'is-warn' };
    if (commandStatus === 'pending') return { text: 'Wake queued. Waiting for relay.', tone: 'is-warn' };
    if (relayOnline) return { text: 'Relay online. Ready to wake.', tone: 'is-good' };
    return { text: '', tone: '' };
  }

  function renderWolStatus(data) {
    latestWolStatus = data || latestWolStatus;
    if (!latestWolStatus) return;
    const relayOnline = Boolean(latestWolStatus.relay && latestWolStatus.relay.online);
    const relayChip = document.getElementById('relayChip');
    const relayDot = document.getElementById('relayDot');
    const relayText = document.getElementById('relayText');
    const wakePcBtn = document.getElementById('wakePcBtn');
    const pcStatusDetailEl = document.getElementById('pcStatusDetail');

    if (relayChip) relayChip.classList.toggle('hidden', !relayOnline);
    if (relayDot) relayDot.classList.toggle('online', relayOnline);
    if (relayText) {
      relayText.textContent = relayOnline ? 'Online' : 'Offline';
      relayText.classList.toggle('is-online', relayOnline);
    }
    const metricLabel = document.querySelector('#pcCard .metric-label');
    if (metricLabel) metricLabel.classList.toggle('hidden', !relayOnline);
    if (wakePcBtn) {
      wakePcBtn.disabled = wolWakeBusy || !relayOnline;
      wakePcBtn.textContent = wolWakeBusy ? 'Sending...' : 'Wake';
    }
    if (pcStatusDetailEl) {
      applyPcStatusDetail(pcStatusDetail(latestWolStatus));
    }
  }

  async function loadWolStatus() {
    const data = await requestJson('/api/wol/status');
    renderWolStatus(data);
    return data;
  }

  async function wakePc() {
    const relayOnline = Boolean(latestWolStatus && latestWolStatus.relay && latestWolStatus.relay.online);
    if (wolWakeBusy || !relayOnline) {
      if (!relayOnline) setStatus('Relay is offline.', true);
      return;
    }
    wolWakeBusy = true;
    renderWolStatus();
    setStatus('Sending wake command...');
    try {
      const data = await requestJson('/api/wol/wake', { method: 'POST' });
      renderWolStatus(data);
      setStatus(data.message || 'Wake command queued.');
      setTimeout(() => loadWolStatus().catch(() => {}), 1200);
    } catch (error) {
      setStatus(error.message || 'Wake command failed.', true);
    } finally {
      wolWakeBusy = false;
      renderWolStatus();
    }
  }

  function formatFahrenheit(value) {
    return Number.isFinite(value) ? Math.round(value) + '°F' : '--';
  }

  function formatTemperature(temp) {
    const fahrenheit = Number(temp && temp.fahrenheit);
    const celsius = Number(temp && temp.celsius);
    if (Number.isFinite(celsius) && Number.isFinite(fahrenheit)) return Math.round(celsius) + '°C / ' + Math.round(fahrenheit) + '°F';
    if (Number.isFinite(celsius)) return Math.round(celsius) + '°C';
    return formatFahrenheit(fahrenheit);
  }

  function normalizePhase(state) {
    const phase = String(state && state.phase ? state.phase : 'stopped').toLowerCase();
    return phase === 'cooling' || phase === 'resting' ? phase : 'stopped';
  }

  function phaseLabel(phase) {
    if (phase === 'cooling') return 'Cooling';
    if (phase === 'resting') return 'Resting';
    return 'Stopped';
  }

  function renderTemperature(temp, powered) {
    const activeTempValue = document.getElementById('activeTempValue');
    if (activeTempValue) activeTempValue.textContent = powered ? formatTemperature(temp) : '--';
  }

  function isDeviceOnlineState(state) {
    return state && state.device_online === true;
  }

  function connectionTitle(state, deviceOnline) {
    if (!deviceOnline) return 'Offline';
    return state.device_connection_verified === false ? 'Last Known' : 'Online';
  }

  function renderState(state) {
    if (!state) return;
    latestState = state;
    const deviceOnline = isDeviceOnlineState(state);
    const powered = deviceOnline && Boolean(state.power_switch);
    const phase = normalizePhase(state);
    const visualPhase = deviceOnline ? (powered ? phase : 'off') : 'offline';
    const activeTempF = Number(state.active_temperature && state.active_temperature.fahrenheit);
    const coolingSetpointF = Number(state.cycle && state.cycle.cooling_setpoint_f);
    const restingSetpointF = Number(state.cycle && state.cycle.resting_setpoint_f);

    appShell.dataset.phase = visualPhase;
    appShell.dataset.deviceOnline = deviceOnline ? 'true' : 'false';
    document.body.dataset.phase = visualPhase;
    renderTemperature(state.active_temperature, powered);
    const phaseChip = document.getElementById('phaseChip');
    if (phaseChip) phaseChip.classList.toggle('hidden', !deviceOnline);
    document.getElementById('phase').textContent = deviceOnline ? (powered ? phaseLabel(phase) : 'Power Off') : 'Offline';
    const statusLabel = document.getElementById('statusLabel');
    if (statusLabel) statusLabel.classList.toggle('hidden', !deviceOnline);
    document.getElementById('statusTitle').textContent = connectionTitle(state, deviceOnline);
    document.getElementById('remaining').textContent = deviceOnline ? formatRemaining(state.remaining_seconds) : '--:--';
    const cycleBtn = document.getElementById('cycleBtn');
    cycleBtn.textContent = state.running ? 'Stop Cycle' : 'Start Cycle';
    cycleBtn.disabled = acActionBusy || (state.running ? false : (!deviceOnline || !powered));
    cycleBtn.classList.toggle('action-primary', !state.running);
    cycleBtn.classList.toggle('action-danger', Boolean(state.running));

    const compressorOn = Number.isFinite(activeTempF) && Number.isFinite(coolingSetpointF) && Math.abs(activeTempF - coolingSetpointF) < 0.5;
    const compressorControl = document.getElementById('compressorControl');
    const compressorToggle = document.getElementById('compressorToggle');
    compressorToggle.checked = powered && compressorOn;
    compressorControl.classList.toggle('is-active', powered && compressorOn);
    compressorControl.classList.toggle('is-disabled', acActionBusy || !deviceOnline || !powered);
    compressorControl.disabled = acActionBusy || !deviceOnline || !powered;
    compressorControl.setAttribute('aria-pressed', powered && compressorOn ? 'true' : 'false');
    compressorControl.title = deviceOnline ? (powered ? (compressorOn ? 'Set to ' + formatFahrenheit(restingSetpointF) + '.' : 'Set to ' + formatFahrenheit(coolingSetpointF) + '.') : 'Turn AC on first.') : 'Device is offline.';

    const swingToggle = document.getElementById('swingToggle');
    const swingControl = document.getElementById('swingControl');
    swingToggle.checked = powered && Boolean(state.swing_wind);
    swingControl.classList.toggle('is-active', powered && Boolean(state.swing_wind));
    swingControl.classList.toggle('is-disabled', acActionBusy || !deviceOnline || !powered);
    swingControl.disabled = acActionBusy || !deviceOnline || !powered;
    swingControl.setAttribute('aria-pressed', powered && Boolean(state.swing_wind) ? 'true' : 'false');

    renderPowerButton();
    if (deviceOnline && state.last_error) setStatus(state.last_error, true);
  }

  async function loadState() {
    const data = await requestJson('/api/state');
    renderState(data.state);
  }

  function setDeviceProbeBusy(busy) {
    deviceProbeBusy = Boolean(busy);
  }

  async function probeDeviceStatus() {
    if (deviceProbeBusy) return;
    setDeviceProbeBusy(true);
    try {
      const data = await requestJson('/api/device-probe', { method: 'POST' });
      latestState = data.state;
    } catch (error) {
      if (latestState) {
        latestState = { ...latestState, device_online: false, device_connection_verified: false, device_status_error: error.message || 'Device status could not be verified.' };
      }
      throw error;
    } finally {
      setDeviceProbeBusy(false);
      if (latestState) renderState(latestState);
    }
  }

  async function postAction(path, body) {
    if (acActionBusy) return;
    acActionBusy = true;
    if (latestState) renderState(latestState);
    setStatus('Sending...');
    try {
      const data = await requestJson(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      renderState(data.state);
      setStatus(data.message || 'Done.');
    } catch (error) {
      if (!error.silent) setStatus(error.message, true);
      await loadState().catch(() => {});
    } finally {
      acActionBusy = false;
      if (latestState) renderState(latestState);
    }
  }

  async function toggleCompressor() {
    if (!isDeviceOnlineState(latestState) || !latestState.power_switch) return;
    const isCooling = Boolean(document.getElementById('compressorToggle').checked);
    await postAction('/api/phase', { phase: isCooling ? 'resting' : 'cooling' });
  }

  async function toggleSwing() {
    if (!isDeviceOnlineState(latestState) || !latestState.power_switch) return;
    await postAction('/api/swing', { enabled: !latestState.swing_wind });
  }

  async function togglePower() {
    if (powerButtonBusy || !isDeviceOnlineState(latestState)) return;
    powerButtonBusy = true;
    renderPowerButton();
    try {
      await postAction('/api/power', { enabled: !(latestState && latestState.power_switch) });
    } finally {
      powerButtonBusy = false;
      renderPowerButton();
    }
  }

  function toggleCycle() {
    const running = Boolean(latestState && latestState.running);
    if (running) return postAction('/api/stop');
    if (!isDeviceOnlineState(latestState) || !latestState.power_switch) return;
    return postAction('/api/start');
  }

  function renderPowerButton() {
    const button = document.getElementById('powerButton');
    if (!button) return;
    const deviceOnline = isDeviceOnlineState(latestState);
    const on = deviceOnline && latestState && latestState.power_switch;
    button.classList.toggle('power-on', Boolean(on));
    button.classList.toggle('power-off', !on);
    button.classList.toggle('is-busy', powerButtonBusy);
    button.disabled = powerButtonBusy || acActionBusy || !deviceOnline;
    button.setAttribute('aria-label', deviceOnline ? (on ? 'Turn AC power off' : 'Turn AC power on') : 'Device offline');
    button.setAttribute('aria-pressed', on ? 'true' : 'false');
    button.title = deviceOnline ? (on ? 'Turn AC power off' : 'Turn AC power on') : 'Device is offline.';
  }

  async function init() {
    const session = await fetch('/api/session', { credentials: 'same-origin' }).then((r) => r.json()).catch(() => ({ authenticated: false }));
    if (!session.authenticated) {
      showLogin();
      return;
    }
    await loadState();
    showApp();
    await probeDeviceStatus().catch(() => {});
    startStateRefresh();
  }

  loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    setStatus('Signing in...');
    try {
      await requestJson('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: passwordInput.value }),
      });
      passwordInput.value = '';
      await loadState();
      showApp();
      await probeDeviceStatus().catch(() => {});
      startStateRefresh();
    } catch (error) {
      setStatus(error.message || 'Login failed.', true);
    }
  });

  async function logoutPanel() {
    await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
    showLogin('Logged out.');
  }

  document.getElementById('logoutBtn').addEventListener('click', logoutPanel);
  acTab.addEventListener('click', () => setPanelView('ac'));
  pcTab.addEventListener('click', () => setPanelView('pc'));
  document.getElementById('wakePcBtn').addEventListener('click', wakePc);
  document.getElementById('cycleBtn').addEventListener('click', toggleCycle);
  document.getElementById('compressorControl').addEventListener('click', toggleCompressor);
  document.getElementById('swingControl').addEventListener('click', toggleSwing);
  appShell.addEventListener('pointerdown', beginTabSwipe, { passive: true });
  appShell.addEventListener('pointermove', moveTabSwipe, { passive: true });
  appShell.addEventListener('pointerup', finishTabSwipe);
  appShell.addEventListener('pointercancel', cancelTabSwipe, { passive: true });
  appShell.addEventListener('click', suppressClickAfterTabSwipe, true);

  document.getElementById('powerButton').addEventListener('click', togglePower);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  init().catch((error) => showLogin(error.message || 'Could not load control state.'));
</script>
</body>
</html>
