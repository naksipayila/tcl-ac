name = "tcl-ac"
main = "src/worker.js"
compatibility_date = "2026-07-07"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[triggers]
crons = ["* * * * *"]

[[kv_namespaces]]
binding = "WOL_STATE"
id = "6c19831b829f4044a8e2b7d51605ab39"

[vars]
DEVICE_ID = "DWG42RFAAAE"
API_BASE_URL = "https://eu-iot-api-prod.tcljd.com"
IOT_DATA_ENDPOINT = "https://data.iot.eu-central-1.amazonaws.com"
IOT_CONTROL_ENDPOINT = "https://iot.eu-central-1.amazonaws.com"
AWS_REGION = "eu-central-1"
APP_ID = "wx6e1af3fa84fbe523"
COOLING_SETPOINT_F = "70"
RESTING_SETPOINT_F = "80"
COOLING_MINUTES = "20"
RESTING_MINUTES = "20"
MIN_SECONDS_BETWEEN_COMMANDS = "5"
STARTUP_SWING = "1"
PC_NAME = "Home PC"
RELAY_OFFLINE_AFTER_SECONDS = "240"
RELAY_POLL_SECONDS = "3"
WOL_RELAY_HEARTBEAT_SECONDS = "120"
CLAIM_TIMEOUT_SECONDS = "30"

[[d1_databases]]
binding = "DB"
database_name = "tcl-ac-state"
database_id = "ca12075b-a5df-443c-8bdc-e7f54323692b"
